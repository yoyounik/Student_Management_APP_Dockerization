apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}-studentapp
  ports:
      - protocol: TCP
        port: {{ .Values.service.port }}
        targetPort: {{ .Values.containerPort }}
        nodePort: {{ .Values.service.nodePort }}