# Name of your workflow (shown on GitHub Actions tab)
name: CI - Build and Push Docker Image

# TRIGGER: When should this workflow run?
on:
  push:
    branches:
      - main        # Runs automatically when you push to main branch

# JOBS: What should it do?
jobs:
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest    # GitHub provides a free Ubuntu machine to run this

    steps:

      # Step 1: Checkout your code
      # Without this, the Ubuntu machine won't have your code
      - name: Checkout Code
        uses: actions/checkout@v3

      # Step 2: Login to Docker Hub
      # Uses the secrets you added in GitHub repo settings
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build the Docker image
      # This triggers our multi-stage Dockerfile
      # Maven downloads dependencies, builds jar, all inside Docker
      - name: Build Docker Image
        run: docker build -t ${{ secrets.nikstatus07 }}/mystudentapp:latest .

      # Step 4: Push the image to Docker Hub
      # After this, image is publicly available on your Docker Hub
      - name: Push Docker Image to Docker Hub
        run: docker push ${{ secrets.nikstatus07 }}/mystudentapp:latest
